# Parquet data source example
# Generated by metadata-driven framework

source_config:
  type: file  # Required: 'file' or 'rdbms'
  location: /Volumes/main/default/my_volume/transactions/
  file_type: parquet
  recursive: true
  spark_config:
    mode: PERMISSIVE
    columnNameOfCorruptRecord: _corrupt_record

target_config:
  catalog: main
  schema: bronze
  table: transactions
  bad_records:
    table_suffix: _corrupt_records
  # audit_columns is OPTIONAL - if not provided, defaults are:
  #   ingestion_id: __ingestion_id
  #   processed_timestamp: __processed_timestamp

archive:
  enabled: true
  folder_name: archive

# JSON data source example
# Generated by metadata-driven framework

source_config:
  type: file  # Required: 'file' or 'rdbms'
  location: /Volumes/main/default/my_volume/events/
  file_type: json
  recursive: true
  spark_config:
    mode: PERMISSIVE
    columnNameOfCorruptRecord: _corrupt_record
    multiLine: 'false'
  schema_hints: "event_id STRING, event_type STRING, timestamp TIMESTAMP, payload STRING"

target_config:
  catalog: main
  schema: bronze
  table: events
  bad_records:
    table_suffix: _corrupt_records
  # audit_columns is OPTIONAL - if not provided, defaults are:
  #   ingestion_id: __ingestion_id
  #   processed_timestamp: __processed_timestamp

archive:
  enabled: true
  folder_name: archive

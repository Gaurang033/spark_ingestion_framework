# CSV data source example with column mapping
# Generated by metadata-driven framework

source_config:
  type: file  # Required: 'file' or 'rdbms'
  location: /Volumes/demo/raw/files/
  file_type: csv
  recursive: false
  spark_config:
    mode: PERMISSIVE
    header: 'true'
    inferSchema: 'false'
    columnNameOfCorruptRecord: _corrupt_record
    encoding: UTF-8
    delimiter: ','
    quote: '"'
    escape: \
    nullValue: ''
    emptyValue: ''
  column_mapping:
    id: customer_id
    name: customer_name
    email: email
  schema_hints: "id INT, name STRING, email STRING"

target_config:
  table: customers_demo
  bad_records:
    table_suffix: _corrupt_records
    # corrupt_record_threshold: Percentage of corrupt records allowed (0-100)
    # 0 = fail if ANY record is corrupt (strict mode)
    # 10 = allow up to 10% corrupt records (warning only)
    # If percentage exceeds threshold, pipeline fails
    corrupt_record_threshold: 10
  # audit_columns is OPTIONAL - if not provided, defaults are:
  #   ingestion_id: __ingestion_id
  #   processed_timestamp: __processed_timestamp
  audit_columns:
    ingestion_id: __ingestion_id
    processed_timestamp: __processed_timestamp

archive:
  enabled: true
  folder_name: archive

# OPTIONAL: Notification configuration
# Uncomment and configure to enable notifications
notification:
  type: email  # Options: email, slack, teams
  enabled: false  # Set to true to enable notifications
  notify_on_success: false  # Set to true to receive success notifications
  notify_on_error: true  # Always notify on errors
  # Email-specific settings
  smtp_host: smtp.company.com  # Your SMTP server
  smtp_port: 587
  credential_scope: email-credentials  # Databricks secret scope name
  credential_key_username: smtp-username  # Secret key for username
  credential_key_password: smtp-password  # Secret key for password
  from_email: noreply@company.com
  to_emails:
    - admin@company.com
    - dataeng-team@company.com
  subject_prefix: '[Data Pipeline]'

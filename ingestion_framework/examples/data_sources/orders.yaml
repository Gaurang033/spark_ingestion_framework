# Advanced CSV source with multiple options
# Generated by metadata-driven framework

source_config:
  type: file  # Required: 'file' or 'rdbms'
  location: /Volumes/main/default/my_volume/orders/
  file_type: csv
  recursive: true
  spark_config:
    mode: PERMISSIVE
    header: 'true'
    inferSchema: 'false'
    columnNameOfCorruptRecord: _corrupt_record
    dateFormat: yyyy-MM-dd
    timestampFormat: yyyy-MM-dd HH:mm:ss
    encoding: UTF-8
  column_mapping:
    order_num: order_id
    cust_num: customer_id
    ord_date: order_date
    amt: amount
  schema_hints: "order_id STRING, customer_id INT, order_date DATE, amount DECIMAL(10,2)"

target_config:
  catalog: main
  schema: bronze
  table: orders
  bad_records:
    table_suffix: _corrupt_records
  # audit_columns is OPTIONAL - if not provided, defaults are:
  #   ingestion_id: __ingestion_id
  #   processed_timestamp: __processed_timestamp

archive:
  enabled: true
  folder_name: archive
